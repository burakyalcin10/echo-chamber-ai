name: Backend CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-ci.txt

      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Validate cover metadata
        run: python scripts/00_validate_covers.py

      - name: Run fast script dry-runs
        run: |
          python scripts/02_score_covers.py --dry-run --limit 5
          python scripts/03_embed_and_umap.py --dry-run
          python scripts/04_build_rag.py --dry-run

      - name: Run tests
        run: python -m pytest -q

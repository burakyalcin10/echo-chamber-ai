services:
  - type: web
    name: echo-chamber-ai-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: APP_ENV
        value: production
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        value: http://localhost:3000
      - key: FRONTEND_ORIGIN_REGEX
        value: https://.*\.vercel\.app
